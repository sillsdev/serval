apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: serval-api
  name: serval-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serval-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: serval-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - command:
            - dotnet
            - /app/api_server/Serval.ApiServer.dll
          workingDir: /app/api_server
          env:
            - name: Auth__Domain
              value: {{ .Values.auth0Domain}}
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment}}
            - name: ASPNETCORE_DeploymentVersion
              value: {{ default "undefined" .Values.deploymentVersion}}
            - name: ASPNETCORE_Kestrel__Endpoints__Http__Url
              value: http://*:80
            - name: ASPNETCORE_Kestrel__Endpoints__Http2__Url
              value: http://*:81
            - name: ASPNETCORE_Kestrel__Endpoints__Http2__Protocols
              value: Http2
              {{- template "secrets.mongodb" . }}
            - name: ASPNETCORE_ConnectionStrings__Hangfire
              value: $(mongodb_connection)serval_jobs
            - name: ASPNETCORE_ConnectionStrings__Mongo
              value: $(mongodb_connection)serval
            - name: Bugsnag__ReleaseStage
              value: {{ .Values.bugsnagReleaseStage}}
              {{- template "secrets.clearml" . }}
              {{- template "secrets.s3" . }}
          image: {{ .Values.servalImage}}
          imagePullPolicy: "Always"
          name: serval-api
          ports:
            - containerPort: 80
            - containerPort: 81
          resources:
            limits:
              memory: "8Gi"
              cpu: "1.5"
            requests:
              memory: "8Gi"
              cpu: "1.5"
          volumeMounts:
            - mountPath: /var/lib/machine
              name: machine-mount
            - mountPath: /var/lib/serval
              name: serval-mount
            - mountPath: /root/.aspnet/DataProtection-Keys
              name: server-keys
      hostname: serval-api
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 208.67.222.222
      restartPolicy: Always
      volumes:
        - name: machine-mount
          persistentVolumeClaim:
            claimName: machine-claim
        - name: serval-mount
          persistentVolumeClaim:
            claimName: serval-claim
        - name: server-keys
          persistentVolumeClaim:
            claimName: keys-claim
status: {}